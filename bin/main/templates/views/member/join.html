<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>회원가입</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
.container {
    max-width: 500px;
    margin-top: 50px;
}
</style>
</head>

<body>

<div class="container">

<h2 class="mb-4 text-center">회원가입</h2>

<form th:action="@{/member/join}" method="post">

    <!-- 아이디 -->
    <input type="text" name="id" class="form-control mb-2" placeholder="아이디">

    <!-- 비밀번호 -->
    <input type="password" name="pwd" class="form-control mb-2" placeholder="비밀번호">

    <!-- 비밀번호 확인 -->
    <input type="password" id="pwdCheck" class="form-control mb-1" placeholder="비밀번호 확인">
    <small id="pwdMsg"></small>

    <!-- 닉네임 -->
    <input type="text" name="nickName" class="form-control mb-2" placeholder="닉네임">

    <!-- 이메일 -->
    <div class="input-group mb-2">
        <input type="text" id="emailId" class="form-control" placeholder="이메일 아이디">
        <span class="input-group-text">@</span>
        <select id="emailDomain" class="form-select">
            <option value="naver.com">naver.com</option>
            <option value="gmail.com">gmail.com</option>
            <option value="daum.net">daum.net</option>
        </select>
        <button type="button" class="btn btn-outline-primary" id="sendCodeBtn">인증</button>
    </div>

    <!-- 인증번호 -->
    <div class="input-group mb-2">
        <input type="text" id="authCode" class="form-control" placeholder="인증번호">
        <button type="button" class="btn btn-outline-success" id="verifyBtn">확인</button>
    </div>

    <small id="emailMsg" class="mb-2 d-block"></small>

    <!-- 전화번호 -->
    <input type="text" name="phone" class="form-control mb-3" placeholder="전화번호">

    <!-- hidden email -->
    <input type="hidden" name="email" id="fullEmail">

    <!-- 가입 -->
    <button type="submit" class="btn btn-primary w-100">회원가입</button>

</form>

</div>

<script>

// =========================
// 이메일 인증번호 발송
// =========================
$("#sendCodeBtn").click(function () {

    let email = $("#emailId").val() + "@" + $("#emailDomain").val();
    $("#fullEmail").val(email);

    $.ajax({
        url: "/member/send",
        type: "post",
        data: { email: email },
        success: function (res) {

            if (res === "success") {
                sessionStorage.setItem("emailVerified", "false"); // 발송 = 아직 인증 안됨
                $("#emailMsg").text("인증번호 발송 완료").css("color", "green");
            } else {
                $("#emailMsg").text("발송 실패").css("color", "red");
            }
        }
    });
});


// =========================
// 인증번호 확인
// =========================
$("#verifyBtn").click(function () {

    $.ajax({
        url: "/member/verify",
        type: "post",
        data: { code: $("#authCode").val() },
        success: function (res) {

            if (res === "success") {
                sessionStorage.setItem("emailVerified", "true");
                $("#emailMsg").text("이메일 인증 완료").css("color", "green");
            } else {
                sessionStorage.setItem("emailVerified", "false");
                $("#emailMsg").text("인증 실패").css("color", "red");
            }
        }
    });
});


// =========================
// 비밀번호 확인
// =========================
$("#pwdCheck").on("keyup", function () {

    let pwd = $("input[name='pwd']").val();
    let check = $(this).val();

    if (pwd !== check) {
        $("#pwdMsg").text("비밀번호 불일치").css("color", "red");
    } else {
        $("#pwdMsg").text("비밀번호 일치").css("color", "green");
    }
});


// =========================
// submit 통합 제어 (핵심)
// =========================
$("form").submit(function (e) {
    e.preventDefault();

    let emailOk = sessionStorage.getItem("emailVerified");

    let pwd = $("input[name='pwd']").val();
    let pwdCheck = $("#pwdCheck").val();

    // =========================
    // 1. 이메일 인증 체크
    // =========================
    if (emailOk !== "true") {
        alert("이메일 인증 필요");
        return;
    }

    // =========================
    // 2. 비밀번호 일치 체크
    // =========================
    if (pwd !== pwdCheck) {
        alert("비밀번호가 일치하지 않습니다");
        return;
    }

    let formData = $(this).serialize();

    $.post("/member/join", formData, function(res){

        if(res === "SUCCESS"){
            alert("회원가입 완료");
            location.href="/member/login";
        }

        if(res === "EMAIL_NOT_VERIFIED"){
            alert("이메일 인증 필요");
        }

        if(res === "DUPLICATE_EMAIL"){
            alert("이미 가입된 이메일입니다");
        }

        if(res === "FAIL"){
            alert("회원가입 실패");
        }
    });
});

</script>

</body>
</html>
