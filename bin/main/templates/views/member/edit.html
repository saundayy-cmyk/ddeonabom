<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>내 정보 수정 — 떠나봄</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: '#4F46E5', // 서비스 포인트 컬러 (예시: 인디고 계열)
          'brand-ink': '#4338CA',
          'brand-soft': '#E0E7FF',
          ink: '#1F2937',
          muted: '#4B5563',
          faint: '#9CA3AF',
          line: '#E5E7EB',
          sunk: '#F3F4F6',
          err: '#EF4444'
        }
      }
    }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style> body { font-family:'Noto Sans KR', system-ui, sans-serif; -webkit-font-smoothing:antialiased; letter-spacing:-0.01em; } </style>
</head>
<body class="bg-white text-ink">

<div th:replace="~{views/common/head::head}"></div>

<main class="mx-auto max-w-2xl px-6 pb-24 pt-16">
  <h1 class="mb-8 text-3xl font-extrabold tracking-tight">내 정보 수정</h1>

  <form action="/member/update" method="POST" class="space-y-6">
    
    <div class="rounded-xl border border-line bg-white p-8 shadow-soft">
      <h2 class="mb-6 text-base font-bold">프로필</h2>
      <div class="flex items-center gap-6">
        <div class="flex h-20 w-20 items-center justify-center rounded-full bg-brand text-3xl font-extrabold text-white">바</div>
        <div class="flex items-center gap-2">
          <button type="button" class="inline-flex h-9 items-center rounded-lg border border-line bg-white px-4 text-sm font-semibold text-ink transition hover:bg-sunk">이미지 변경</button>
          <button type="button" class="text-sm font-semibold text-brand">삭제</button>
        </div>
      </div>
      <div class="mt-6 flex flex-col gap-5">
        <div class="flex flex-col gap-2">
          <label for="nickName" class="text-xs font-semibold">닉네임</label>
          <input type="text" id="nickName" name="nickName" th:value="${session.loginUser?.nickName}" required 
                 class="h-12 rounded-lg border border-line bg-white px-4 text-sm outline-none transition focus:border-brand focus:ring-4 focus:ring-brand-soft" />
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-xs font-semibold">아이디</label>
          <input type="text" th:value="${session.loginUser?.id}" readonly 
                 class="h-12 rounded-lg border border-line bg-sunk px-4 text-sm text-muted outline-none cursor-not-allowed" />
        </div>
      </div>
    </div>

    <div class="rounded-xl border border-line bg-white p-8 shadow-soft">
      <h2 class="mb-6 text-base font-bold">이메일 인증</h2>
      <div class="flex flex-col gap-5">
        <div class="flex flex-col gap-2">
          <label for="email" class="text-xs font-semibold">이메일</label>
          <div class="flex gap-2">
            <input type="email" id="email" name="email" th:value="${session.loginUser?.email}" required readonly 
                   class="h-12 flex-1 rounded-lg border border-line bg-sunk px-4 text-sm text-muted outline-none cursor-not-allowed" />
            <button type="button" id="sendCodeBtn" 
                    class="inline-flex h-12 shrink-0 items-center rounded-lg border border-line bg-white px-4 text-sm font-semibold text-ink transition hover:bg-sunk">인증번호 발송</button>
          </div>
        </div>
        <div id="authArea" class="flex flex-col gap-2">
          <label for="authCode" class="text-xs font-semibold">인증번호</label>
          <div class="flex gap-2">
            <input type="text" id="authCode" name="authCode" placeholder="메일로 받은 6자리" required 
                   class="h-12 flex-1 rounded-lg border border-line bg-white px-4 text-sm outline-none transition placeholder:text-faint focus:border-brand focus:ring-4 focus:ring-brand-soft" />
            <button type="button" id="verifyBtn" 
                    class="inline-flex h-12 shrink-0 items-center rounded-lg border border-line bg-white px-4 text-sm font-semibold text-ink transition hover:bg-sunk">인증</button>
          </div>
        </div>
        <small id="emailMsg" class="block mt-1 text-xs"></small>
      </div>
    </div>

    <div class="rounded-xl border border-line bg-white p-8 shadow-soft">
      <h2 class="mb-6 text-base font-bold">비밀번호 변경</h2>
      <div class="flex flex-col gap-5">
        <div class="flex flex-col gap-2">
          <label for="currentPassword" class="text-xs font-semibold">현재 비밀번호</label>
          <input type="password" id="currentPassword" name="currentPassword" placeholder="현재 비밀번호" 
                 class="h-12 rounded-lg border border-line bg-white px-4 text-sm outline-none transition placeholder:text-faint focus:border-brand focus:ring-4 focus:ring-brand-soft" />
        </div>
        <div class="flex flex-col gap-2">
          <label for="newPassword" class="text-xs font-semibold">새 비밀번호</label>
          <input type="password" id="newPassword" name="newPassword" placeholder="8자 이상, 영문/숫자/특수문자" 
                 class="h-12 rounded-lg border border-line bg-white px-4 text-sm outline-none transition placeholder:text-faint focus:border-brand focus:ring-4 focus:ring-brand-soft" />
          <small id="pwdRuleMsg" class="block mt-1 text-xs"></small>
        </div>
        <div class="flex flex-col gap-2">
          <label for="confirmPassword" class="text-xs font-semibold">새 비밀번호 확인</label>
          <input type="password" id="confirmPassword" placeholder="다시 입력" 
                 class="h-12 rounded-lg border border-line bg-white px-4 text-sm outline-none transition placeholder:text-faint focus:border-brand focus:ring-4 focus:ring-brand-soft" />
          <small id="pwdMsg" class="block mt-1 text-xs"></small>
        </div>
      </div>
    </div>

    <div class="my-6 flex justify-end gap-2">
      <a href="/index" class="inline-flex h-11 items-center rounded-lg border border-line bg-white px-5 text-sm font-semibold text-ink transition hover:bg-sunk">취소</a>
      <button type="submit" class="inline-flex h-11 items-center rounded-lg bg-brand px-5 text-sm font-semibold text-white transition hover:bg-brand-ink">변경 사항 저장</button>
    </div>

    <div class="flex items-center justify-between rounded-xl border border-err/20 bg-err/5 p-5">
      <div>
        <div class="font-bold text-err">회원 탈퇴</div>
        <div class="mt-0.5 text-xs text-muted">탈퇴 시 모든 일정·후기·관심 목록이 삭제되며 복구할 수 없습니다.</div>
      </div>
      <a href="/member/withdraw" onclick="return confirmWithdraw(event)"
         class="inline-flex h-10 shrink-0 items-center rounded-lg border border-err bg-white px-4 text-sm font-semibold text-err transition hover:bg-err hover:text-white">회원 탈퇴</a>
    </div>
  </form>
</main>

<footer class="mt-24 border-t border-line bg-sunk pb-12 pt-16 text-sm text-muted">
  <div class="mx-auto flex max-w-7xl items-start justify-between gap-8 px-6">
    <div class="flex flex-col gap-2">
      <div class="flex items-center gap-2 text-lg font-extralight">
        <span class="inline-flex h-6 w-6 items-center justify-center text-brand">
          <svg viewBox="0 0 32 32" class="h-full w-full" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"><path d="M6 24 Q 10 8, 16 14 T 26 6"/><circle cx="6" cy="24" r="1.6" fill="currentColor" stroke="none"/><circle cx="26" cy="6" r="1.6" fill="currentColor" stroke="none"/></svg>
        </span>
        <span>떠나봄</span>
      </div>
      <p class="max-w-xs text-xs leading-relaxed">점이 아니라 길을 그리는 여행 플래너.<br/>관광지를 잇고, 동선을 그리고, 후기를 남깁니다.</p>
    </div>
    <div class="flex gap-12">
      <div class="flex flex-col gap-2">
        <strong class="text-xs font-semibold text-ink">서비스</strong>
        <a href="/sites" class="hover:text-brand">관광지</a>
        <a href="/planner" class="hover:text-brand">일정 플래너</a>
        <a href="/share-board" class="hover:text-brand">일정 공유</a>
      </div>
      <div class="flex flex-col gap-2">
        <strong class="text-xs font-semibold text-ink">커뮤니티</strong>
        <a href="/reviews" class="hover:text-brand">여행 후기</a>
        <a href="/qa-board" class="hover:text-brand">질문 게시판</a>
      </div>
      <div class="flex flex-col gap-2">
        <strong class="text-xs font-semibold text-ink">계정</strong>
        <a href="/member/login" class="hover:text-brand">로그인</a>
        <a href="/member/signup" class="hover:text-brand">회원가입</a>
        <a href="/member/mypage" class="hover:text-brand">마이페이지</a>
      </div>
    </div>
  </div>
  <div class="mx-auto mt-12 flex max-w-7xl items-center justify-between border-t border-line px-6 pt-6">
    <span class="text-xs">© 2026 떠나봄 · 패스파인더 팀 프로젝트</span>
    <span class="text-xs text-faint">v0.1 · UI shell</span>
  </div>
</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script th:src="@{/js/auth.js}"></script>

<script>
$(document).ready(function() {
    
    // 1. 페이지 진입 시 이메일 인증 플래그 리셋
    sessionStorage.setItem("emailVerified", "false"); 

    // 2. 비밀번호 실시간 검증 모듈 연동
    if (typeof initPasswordValidation === "function") {
        initPasswordValidation("#newPassword", "#confirmPassword", "#pwdRuleMsg", "#pwdMsg");
    }

    // 3. 이메일 인증 초기화 (메일 발송 엔진)
    if (typeof initEmailVerification === "function") {
        initEmailVerification({
            sendBtn: "#sendCodeBtn",
            verifyBtn: "#verifyBtn",
            authArea: "#authArea",
            emailMsg: "#emailMsg",
            authCodeInput: "#authCode",
            getEmailFunction: function() {
                return $("#email").val(); 
            }
        });
    }

    // 4. 수정페이지 전용 안전장치 (인풋창 잠금 강제 해제)
    $("#sendCodeBtn").click(function() {
        setTimeout(function() {
            $("#authCode").prop("disabled", false).prop("readonly", false);
            $("#verifyBtn").prop("disabled", false);
            $("#authCode").focus(); 
        }, 100);
    });

    // 5. 정보 수정 폼 서브밋 제어 (여기가 핵심 교정 구역입니다)
    $("form").submit(function (e) {
        e.preventDefault(); // 기본 폼 제출 막기

        let pwd = $("#newPassword").val();
        let pwdCheck = $("#confirmPassword").val();

        // [검증 A] 새로운 비밀번호 유효성 검사
        if (pwd.trim() !== "") {
            let reg = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{8,20}$/;
            if(!reg.test(pwd)){
                alert("새로운 비밀번호 형식을 확인해주세요.");
                return;
            }
            if (pwd !== pwdCheck) {
                alert("새로운 비밀번호가 일치하지 않습니다.");
                return;
            }
        }

        // [검증 B] 본인 인증 여부 체크
        if (sessionStorage.getItem("emailVerified") !== "true") {
            alert("수정을 완료하려면 이메일 인증이 필수입니다.");
            return;
        }

        // [검증 C] 닉네임 공백 검증
        let nickName = $("#nickName").val().trim();
        if(nickName === ""){
            alert("닉네임을 입력하세요.");
            return;
        }

        // 💡 [정상 복구] 데이터를 안전하게 묶어주는 직렬화 코드를 명확히 선언!
        let formData = $(this).serialize();
        
        // [서버 통신] AJAX 요청 전송
        $.post("/member/update", formData, function(res){
            if(res === "SUCCESS" || res === "success"){
                alert("회원정보 수정이 완료되었습니다.");
                location.href = "/index"; 
            } else if(res === "WRONG_CURRENT_PASSWORD") {
                alert("현재 비밀번호가 일치하지 않습니다. 다시 확인해주세요.");
                $("#currentPassword").val("").focus();
            } else if(res === "EMAIL_NOT_VERIFIED") {
                alert("이메일 인증 세션이 만료되었거나 번호가 틀렸습니다. 이메일 인증을 다시 진행해주세요.");
            } else if(res === "NOT_LOGGED_IN") {
                alert("로그인 세션이 만료되었습니다. 다시 로그인 해주세요.");
                location.href = "/member/login";
            } else {
                alert("회원정보 수정 실패. 입력 데이터를 다시 확인해주세요.");
            }
        }).fail(function() {
            alert("서버 통신 중 오류가 발생했습니다. 컨트롤러 상태를 확인해 주세요.");
        });
    }); // form submit 끝
}); // document ready 끝

// 6. 탈퇴 재확인 얼럿 함수
function confirmWithdraw(event) {
    event.preventDefault(); 
    const response = confirm("정말로 탈퇴하시겠습니까?\n탈퇴 시 모든 데이터가 삭제되며 복구할 수 없습니다.");
    if (response) {
        const targetUrl = event.target.closest('a').getAttribute('href');
        window.location.href = targetUrl;
    }
}
</script>
</body>
</html>
