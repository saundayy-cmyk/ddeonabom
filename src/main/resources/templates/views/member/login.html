<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{views/common/head::head}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>떠나봄 - 로그인</title>
    <!-- 테일윈드 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">
	
    <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-sm border border-gray-100">
        
        <!-- 로고 / 타이틀 -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-gray-800 tracking-tight">떠나봄</h1>
        </div>
	
        <!-- 로그인 폼 -->
        <form action="/member/login" method="POST" class="space-y-6">
        <!-- 메인페이지 만들기전까지만 로그인후 수정페이지로 -->
            <input type="hidden" name="targetUrl" value="/member/edit">
            <!-- 아이디 입력 -->
            <div>
                <label for="id" class="block text-sm font-medium text-gray-700 mb-2">아이디</label>
                <input type="text" id="id" name="id" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all">
            </div>

            <!-- 비밀번호 입력 -->
            <div>
                <label for="pwd" class="block text-sm font-medium text-gray-700 mb-2">비밀번호</label>
                <input type="password" id="pwd" name="pwd" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all">
            </div>

            <!-- 로그인 버튼 -->
            <div class="pt-4">
                <button type="submit" 
                        class="w-full bg-gray-800 text-white font-medium py-3 rounded-lg hover:bg-gray-700 transition-colors shadow-sm">
                    로그인
                </button>
            </div>
        </form>
        <div th:if="${param.error}" class="p-3 mb-4 text-sm text-red-700 bg-red-100 rounded-lg text-center font-medium">
    아이디 또는 비밀번호가 일치하지 않습니다.
</div>
		
        <!-- 하단 링크 영역 (아이디 찾기, 비밀번호 찾기, 회원가입) -->
        <div class="mt-8 pt-6 border-t border-gray-100 text-sm text-center text-gray-500">
            <div class="flex justify-center space-x-4 mb-3">
                <a href="/member/find-id" class="hover:text-gray-800 transition-colors">아이디 찾기</a>
                <span class="text-gray-300">|</span>
                <a href="/member/find-pwd" class="hover:text-gray-800 transition-colors">비밀번호 찾기</a>
            </div>
            <div>
                <a href="/member/join" class="text-indigo-600 hover:text-indigo-500 font-medium transition-colors">회원가입</a>
            </div>
        </div>
    </div>

</body>
</html>
