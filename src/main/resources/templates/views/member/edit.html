<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>떠나봄 - 정보 수정</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen py-10">

    <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-sm border border-gray-100">
        
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-gray-800 tracking-tight">떠나봄</h1>
            <p class="text-sm text-gray-500 mt-2">회원정보 수정</p>
        </div>

        <form action="/member/update" method="POST" class="space-y-6">
            
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-2">아이디</label>
                <input type="text" value="user_id_sample" readonly
                       class="w-full px-4 py-3 bg-gray-100 border border-gray-200 rounded-lg text-gray-500 cursor-not-allowed focus:outline-none">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-2">이메일</label>
                <div class="space-y-2">
                    <input type="email" id="email" name="email" value="member@example.com" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all">
                    <button type="button" 
                            class="text-xs bg-gray-200 text-gray-700 font-medium px-3 py-1.5 rounded hover:bg-gray-300 transition-colors">
                        인증번호 발송
                    </button>
                </div>
            </div>

            <div>
                <label for="authCode" class="block text-sm font-medium text-gray-700 mb-2">인증번호</label>
                <div class="flex gap-2">
                    <input type="text" id="authCode" name="authCode" placeholder="인증번호 입력"
                           class="flex-grow px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all">
                    <button type="button" 
                            class="px-4 py-3 bg-gray-800 text-white text-sm font-medium rounded-lg hover:bg-gray-700 transition-colors shrink-0">
                        인증번호 확인
                    </button>
                </div>
            </div>

            <div>
                <label for="nickname" class="block text-sm font-medium text-gray-700 mb-2">닉네임</label>
                <input type="text" id="nickname" name="nickname" value="봄날의여행자" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all">
            </div>

            <div>
                <label for="newPassword" class="block text-sm font-medium text-gray-700 mb-2">새로운 비밀번호</label>
                <input type="password" id="newPassword" name="newPassword" placeholder="변경할 비밀번호 입력 (선택)"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all">
            </div>

            <div>
                <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-2">새로운 비밀번호 확인</label>
                <input type="password" id="confirmPassword" placeholder="비밀번호 재입력"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all">
            </div>

            <div class="flex items-center justify-between pt-4 gap-4">
                <button type="submit" 
                        class="flex-1 bg-gray-800 text-white font-medium py-3 rounded-lg hover:bg-gray-700 transition-colors text-center shadow-sm">
                    수정 완료
                </button>
                <a href="/member/mypage" 
                   class="flex-1 bg-gray-100 text-gray-700 font-medium py-3 rounded-lg hover:bg-gray-200 transition-colors text-center shadow-sm">
                    취소
                </a>
            </div>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <a href="/member/withdraw" 
               onclick="return confirmWithdraw(event)"
               class="text-xs text-gray-400 hover:text-red-500 transition-colors underline decoration-dotted">
                회원 탈퇴
            </a>
        </div>

    </div>

<script>
function confirmWithdraw(event) {
    event.preventDefault(); 
    
    const response = confirm("정말로 탈퇴하시겠습니까?\n탈퇴 시 모든 데이터가 삭제되며 복구할 수 없습니다.");
    
    if (response) {
        // 클릭된 타겟(a태그)의 href 주소를 확실하게 가져와서 이동시킵니다.
        const targetUrl = event.target.closest('a').getAttribute('href');
        window.location.href = targetUrl;
    }
}
</script>
</body>
</html>
