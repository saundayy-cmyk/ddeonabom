<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>아이디 찾기 — 떠나봄</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script th:src="@{/js/tw.js}"></script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght=200;300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style> body { font-family:'Noto Sans KR', system-ui, sans-serif; -webkit-font-smoothing:antialiased; letter-spacing:-0.01em; } </style>
</head>
<body class="bg-white text-ink">

<header class="sticky top-0 z-50 h-header border-b border-line bg-white/80 backdrop-blur-md backdrop-saturate-150">
  <div class="mx-auto flex h-full max-w-wide items-center justify-between px-6">
    <a th:href="@{/}" class="flex items-center gap-2">
      <span class="inline-flex h-6 w-6 items-center justify-center text-brand">
        <svg viewBox="0 0 32 32" class="h-full w-full" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"><path d="M6 24 Q 10 8, 16 14 T 26 6"/><circle cx="6" cy="24" r="1.6" fill="currentColor" stroke="none"/><circle cx="26" cy="6" r="1.6" fill="currentColor" stroke="none"/></svg>
      </span>
      <span class="text-xl font-extralight tracking-wide">떠나봄</span>
    </a>
  </div>
</header>

<main class="mx-auto max-w-md px-6 py-24">
  <h1 class="mb-2 text-3xl font-extrabold tracking-tight">아이디 찾기</h1>
  <p class="mb-12 text-15 leading-relaxed text-muted">가입 시 등록한 이메일로 아이디를 확인할 수 있습니다.</p>

  <div class="mb-12 flex gap-1 rounded-lg border border-line bg-sunk p-1">
    <a th:href="@{/member/find-id}" class="flex-1 rounded-md bg-white py-2.5 text-center text-sm font-semibold text-ink shadow-soft">아이디 찾기</a>
    <a th:href="@{/member/find-pwd}" class="flex-1 rounded-md py-2.5 text-center text-sm font-semibold text-muted">비밀번호 찾기</a>
  </div>

  <form id="findIdForm" onsubmit="return false;" class="flex flex-col gap-4">
    <div class="flex flex-col gap-2">
      <label class="text-13 font-semibold">이메일</label>
      <div class="flex gap-2">
        <input type="email" id="userEmail" name="email" class="h-12 flex-1 rounded-lg border border-line bg-white px-4 text-sm outline-none transition" placeholder="가입 시 등록한 이메일" />
        <button type="button" id="btnSendCode" class="inline-flex h-12 shrink-0 items-center rounded-lg border border-line bg-white px-4 text-sm font-semibold text-ink transition hover:bg-sunk">인증번호 발송</button>
      </div>
    </div>
    <div class="flex flex-col gap-2">
      <label class="text-13 font-semibold">인증번호</label>
      <div class="flex gap-2">
        <input type="text" id="authCode" class="h-12 flex-1 rounded-lg border border-line bg-white px-4 text-sm outline-none transition" placeholder="메일로 받은 6자리" />
        <button type="button" id="btnVerifyCode" class="inline-flex h-12 shrink-0 items-center rounded-lg border border-line bg-white px-4 text-sm font-semibold text-ink transition hover:bg-sunk">인증 확인</button>
      </div>
    </div>
    
    <div id="statusMsg" class="text-sm font-medium mt-1"></div>

    <button type="button" id="btnSubmitFindId" disabled 
        class="mt-2 inline-flex h-12 w-full items-center justify-center rounded-lg text-15 font-semibold transition
               bg-brand text-white hover:bg-brand-ink 
               disabled:bg-gray-300 disabled:text-white disabled:cursor-not-allowed">
  아이디 조회하기
</button>
  </form>

  <div id="searchResultArea" class="mt-6 rounded-xl bg-brand-soft p-6 text-center hidden">
    <div class="mb-1.5 text-13 text-muted">회원님의 아이디는</div>
    <div id="foundIdDisplay" class="text-xl font-extrabold text-brand-ink"></div>
    <div class="mt-1 text-13 text-brand-ink/80">보안을 위해 일부만 표시됩니다.</div>
    <div class="mt-4 flex justify-center gap-2">
      <a th:href="@{/member/login}" class="inline-flex h-9 items-center rounded-lg bg-brand px-4 text-sm font-semibold text-white transition hover:bg-brand-ink">로그인</a>
      <a th:href="@{/member/find-pwd}" class="inline-flex h-9 items-center rounded-lg border border-line bg-white px-4 text-sm font-semibold text-ink transition hover:bg-sunk">비밀번호 찾기</a>
    </div>
  </div>
</main>

<script th:src="@{/js/auth.js}"></script>

<script>
$(document).ready(function() {
    // 💡 [해결 핵심 3] 억지로 이벤트를 꼬아서 오버라이딩 하지 말고, 
    // 기존에 검증된 auth.js의 규격(함수 주입식)을 그대로 사용하여 안전하게 초기화합니다.
    initEmailVerification({
        sendBtn: "#btnSendCode",
        verifyBtn: "#btnVerifyCode",
        authArea: null, 
        emailMsg: "#statusMsg",
        authCodeInput: "#authCode",
        getEmailFunction: function() {
            return $("#userEmail").val().trim();
        },
        successCallback: function() {
            // 💡 이메일 인증 성공 시 수행할 아이디 찾기 화면만의 단독 후처리!
            $("#btnSubmitFindId").prop("disabled", false)
                                 // 테일윈드 엔진의 꼬인 클래스 우선순위를 완전히 무시하고 실시간 강제 인젝션
                                 .removeClass("cursor-not-allowed")
                                 .css({
                                     "background-color": "var(--brand, #059669)", // 🟢 프로젝트의 진짜 브랜드 컬러 코드(예: #059669 등)로 적어주세요!
                                     "color": "#ffffff"
                                 });
                                 
            $("#userEmail").prop("readonly", true);
        }
    });

    // 최종 아이디 조회 처리 (컨트롤러 직통 타격)
    $("#btnSubmitFindId").click(function() {
        let email = $("#userEmail").val().trim();
        
        $.post("/member/find-id", { email: email }, function(res) {
            if(res !== "FAIL" && res !== "EMAIL_NOT_VERIFIED") {
                $("#searchResultArea").removeClass("hidden");
                $("#foundIdDisplay").text(res);
                $("#findIdForm").addClass("hidden"); 
            } else if(res === "EMAIL_NOT_VERIFIED") {
                $("#statusMsg").text("🚨 세션 인증이 만료되었습니다. 다시 인증해 주세요.").css("color", "red");
            } else {
                $("#statusMsg").text("❌ 해당 이메일로 등록된 아이디가 없습니다.").css("color", "red");
            }
        });
    });
});
</script>
</body>
</html>
