<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="modal">
  <!-- 딤 배경 -->
	<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-5 hidden"id="dim-background" onclick="if(event.target===this) closeModal();">
		<!-- info 모달 -->
		<div role="dialog" aria-modal="true" id="modal-info"
		     class="hidden w-96 max-w-full overflow-hidden rounded-2xl bg-white shadow-2xl">
		  <div class="px-7 pb-6 pt-7 text-center">
		    <div class="mx-auto mb-3.5 flex h-12 w-12 items-center justify-center rounded-full bg-indigo-50 text-indigo-600">
		      <svg viewBox="0 0 24 24" fill="none" class="h-5 w-5">
		        <path d="M12 11v6M12 7.5v.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
		        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
		      </svg>
		    </div>
		    <h2 class="mb-1.5 text-lg font-extrabold tracking-tight text-slate-900" id="info-title">알림</h2>
		    <p class="text-sm leading-relaxed text-slate-500" id="info-text"></p>
		  </div>
		  <div class="px-5 pb-5">
		    <button class="h-11 w-full rounded-xl bg-indigo-600 text-sm font-semibold text-white hover:bg-indigo-700"
		            onclick="closeModal()">확인</button>
		  </div>
		</div>
		
		<!-- confirm 모달 -->
		<div role="dialog" aria-modal="true" id="modal-confirm"
		     class="hidden w-96 max-w-full overflow-hidden rounded-2xl bg-white shadow-2xl">
		  <div class="px-7 pb-6 pt-7 text-center">
		    <div class="mx-auto mb-3.5 flex h-12 w-12 items-center justify-center rounded-full bg-indigo-50 text-indigo-600">
		      <svg viewBox="0 0 24 24" fill="none" class="h-5 w-5">
		        <path d="M9.2 9a2.8 2.8 0 1 1 4.2 2.4c-.9.6-1.4 1-1.4 2M12 17.2v.3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
		        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
		      </svg>
		    </div>
		    <h2 class="mb-1.5 text-lg font-extrabold tracking-tight text-slate-900" id="confirm-title">이 일정을 공유할까요?</h2>
		    <p class="text-sm leading-relaxed text-slate-500" id="confirm-text">공유하면 다른 여행자들이 내 일정을 볼 수 있어요.</p>
		  </div>
		  <div class="flex gap-2 px-5 pb-5">
		    <button class="h-11 flex-1 rounded-xl border border-slate-200 bg-white text-sm font-semibold text-slate-900 hover:bg-slate-100"
		            onclick="closeModal()">취소</button>
		    <button class="h-11 flex-1 rounded-xl bg-indigo-600 text-sm font-semibold text-white hover:bg-indigo-700"
		            id="confirm-ok">확인</button>
		  </div>
		</div>
		
		<!-- danger 모달 -->
		<div role="dialog" aria-modal="true" id="modal-danger"
		     class="hidden w-96 max-w-full overflow-hidden rounded-2xl bg-white shadow-2xl">
		  <div class="px-7 pb-6 pt-7 text-center">
		    <div class="mx-auto mb-3.5 flex h-12 w-12 items-center justify-center rounded-full bg-red-50 text-red-600">
		      <svg viewBox="0 0 24 24" fill="none" class="h-5 w-5">
		        <path d="M12 8.5v5M12 16.7v.3" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
		        <path d="M10.3 3.9 2.4 18a1.9 1.9 0 0 0 1.7 2.9h15.8A1.9 1.9 0 0 0 21.6 18L13.7 3.9a1.9 1.9 0 0 0-3.4 0Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
		      </svg>
		    </div>
		    <h2 class="mb-1.5 text-lg font-extrabold tracking-tight text-slate-900" id="danger-title">이 일정을 삭제할까요?</h2>
		    <p class="text-sm leading-relaxed text-slate-500" id="danger-text">삭제한 일정은 되돌릴 수 없어요.</p>
		  </div>
		  <div class="flex gap-2 px-5 pb-5">
		    <button class="h-11 flex-1 rounded-xl border border-slate-200 bg-white text-sm font-semibold text-slate-900 hover:bg-slate-100"
		            onclick="closeModal()">취소</button>
		    <button class="h-11 flex-1 rounded-xl bg-red-600 text-sm font-semibold text-white hover:brightness-95"
		            id="danger-ok">삭제</button>
		  </div>
		</div>

	</div>
	
	<div id="toast-container" class="pointer-events-none fixed inset-x-0 bottom-6 z-50 flex flex-col items-center gap-2"> </div>
	
	<script>
	/* ── 모달 ── */
    let currentModal = null;

    function openModal(modalId) {
      if (currentModal) currentModal.classList.add('hidden');
      currentModal = document.getElementById(modalId);
      currentModal.classList.remove('hidden');
      document.getElementById('dim-background').classList.remove('hidden');
    }

    function closeModal() {
      if (currentModal) currentModal.classList.add('hidden');
      document.getElementById('dim-background').classList.add('hidden');
      currentModal = null;
    }

    function openInfoModal(title, text) {
      document.getElementById('info-title').innerText = title ?? '알림';
      document.getElementById('info-text').innerText  = text  ?? '';
      openModal('modal-info');
    }

    function openConfirmModal(title, text, onConfirm) {
      document.getElementById('confirm-title').innerText = title ?? '이 일정을 공유할까요?';
      document.getElementById('confirm-text').innerText  = text  ?? '';
      document.getElementById('confirm-ok').onclick = () => { onConfirm?.(); closeModal(); };
      openModal('modal-confirm');
    }

    function openDangerModal(title, text, onConfirm) {
      document.getElementById('danger-title').innerText = title ?? '이 일정을 삭제할까요?';
      document.getElementById('danger-text').innerText  = text  ?? '';
      document.getElementById('danger-ok').onclick = () => { onConfirm?.(); closeModal(); };
      openModal('modal-danger');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    /* ── 토스트 ── */
    function showToast(message, showIcon = true, duration = 3000) {
      const container = document.getElementById('toast-container');

      const toast = document.createElement('div');
      toast.className = 'pointer-events-auto inline-flex items-center gap-2.5 rounded-full bg-slate-900 py-3 px-4 text-sm font-semibold text-white shadow-lg transition-all duration-300 opacity-0 translate-y-2';

      toast.innerHTML = showIcon
        ? `<span class="flex h-5 w-5 shrink-0 items-center justify-center rounded-full bg-indigo-600">
             <svg viewBox="0 0 14 14" fill="none" class="h-3 w-3">
               <path d="M3 7.2 5.8 10 11 4.2" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
             </svg>
           </span>
           <span>${message}</span>`
        : `<span>${message}</span>`;

      container.appendChild(toast);

      // 등장
      requestAnimationFrame(() => {
        toast.classList.remove('opacity-0', 'translate-y-2');
      });

      // 퇴장
      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-2');
        toast.addEventListener('transitionend', () => toast.remove(), { once: true });
      }, duration);
    }
  </script>
</th:block>
</body>
</html>
